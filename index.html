<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Tareas Depto · 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
<style>
/* ══ DESIGN TOKENS ══ */
:root{
  --bg:#08080f;
  --s1:#0f0f1a;
  --s2:#141422;
  --s3:#1c1c2e;
  --s4:#242438;
  --b0:rgba(255,255,255,0.04);
  --b1:rgba(255,255,255,0.08);
  --b2:rgba(255,255,255,0.13);
  --b3:rgba(255,255,255,0.22);
  --t0:#f0f0f8;
  --t1:rgba(240,240,248,0.65);
  --t2:rgba(240,240,248,0.38);
  --t3:rgba(240,240,248,0.18);
  --t4:rgba(240,240,248,0.08);
  /* Daniel = emerald */
  --d:#0ecf97;
  --d2:rgba(14,207,151,0.15);
  --d3:rgba(14,207,151,0.08);
  --dg:rgba(14,207,151,0.3);
  /* Nicolás = violet */
  --n:#9d8ffc;
  --n2:rgba(157,143,252,0.15);
  --n3:rgba(157,143,252,0.08);
  --ng:rgba(157,143,252,0.3);
  /* Status */
  --warn:#fbbf24;
  --err:#f87171;
  --err2:rgba(248,113,113,0.1);
  /* Radii */
  --r8:8px;--r10:10px;--r12:12px;--r16:16px;--r20:20px;--r99:99px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  min-height:100vh;font-family:'DM Sans',sans-serif;
  color:var(--t0);background:var(--bg);
  background-image:
    radial-gradient(ellipse 55% 35% at 5% 0%,rgba(14,207,151,0.07) 0%,transparent 100%),
    radial-gradient(ellipse 45% 30% at 95% 3%,rgba(157,143,252,0.08) 0%,transparent 100%),
    radial-gradient(ellipse 80% 40% at 50% 100%,rgba(99,102,241,0.04) 0%,transparent 100%);
  background-attachment:fixed;
}
button{font-family:'DM Sans',sans-serif;border:none;cursor:pointer;transition:opacity .15s,background .15s,transform .1s}
button:active{transform:scale(0.97)}

/* ══ LAYOUT ══ */
.app{max-width:620px;margin:0 auto;padding:16px 14px 110px}

/* ══ HEADER ══ */
.hdr{
  background:var(--s2);border:1px solid var(--b1);
  border-radius:var(--r20);padding:20px 20px 16px;
  margin-bottom:12px;
}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px}
.hdr-label{font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--t3);margin-bottom:7px}
.hdr-title{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;color:var(--t0);letter-spacing:-.03em;line-height:1}
.hdr-title em{font-style:normal;color:var(--d)}
.hdr-meta{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.hdr-date{font-size:12px;color:var(--t2);font-weight:500}
.sync-pill{font-size:10px;font-weight:600;padding:3px 9px;background:var(--b0);border:1px solid var(--b1);border-radius:var(--r99);color:var(--t3)}
.hdr-reset{background:var(--b0);border:1px solid var(--b1);color:var(--t2);font-size:11px;font-weight:600;padding:8px 14px;border-radius:var(--r8);flex-shrink:0;margin-top:2px}
.hdr-reset:hover{background:var(--b1);color:var(--t1)}

/* ══ PERSON CARDS ══ */
.p-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

@keyframes danPulse{0%,100%{box-shadow:0 0 0 0 transparent,0 1px 12px rgba(0,0,0,.4)}50%{box-shadow:0 0 28px 4px rgba(14,207,151,.18),0 1px 12px rgba(0,0,0,.4)}}
@keyframes nicPulse{0%,100%{box-shadow:0 0 0 0 transparent,0 1px 12px rgba(0,0,0,.4)}50%{box-shadow:0 0 28px 4px rgba(157,143,252,.18),0 1px 12px rgba(0,0,0,.4)}}
.pc{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r16);padding:14px 14px 12px;overflow:hidden;position:relative}
.pc-dan{border-top:2px solid var(--d);animation:danPulse 4s ease-in-out infinite}
.pc-nic{border-top:2px solid var(--n);animation:nicPulse 4s ease-in-out infinite}

.pc-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.pc-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--t0)}
.pc-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:3px 7px;border-radius:var(--r99)}
.pc-dan .pc-tag{background:var(--d3);color:var(--d)}
.pc-nic .pc-tag{background:var(--n3);color:var(--n)}
.pc-score{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;letter-spacing:-.04em;line-height:1;margin-bottom:1px}
.pc-dan .pc-score{color:var(--d)}
.pc-nic .pc-score{color:var(--n)}
.pc-score-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:10px}
.pc-sub{font-size:10px;color:var(--t2);margin-top:5px;font-weight:500}

/* ── liquid bar ── */
@keyframes liquidFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes waveAnim{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes bubbleRise{0%{transform:translateY(0);opacity:.5}100%{transform:translateY(-16px);opacity:0}}
@keyframes sweepAnim{0%{transform:translateX(-100%);opacity:0}30%{opacity:1}100%{transform:translateX(300%);opacity:0}}
@keyframes danGlow{0%,100%{filter:drop-shadow(0 0 2px rgba(14,207,151,.4))}50%{filter:drop-shadow(0 0 10px rgba(14,207,151,.9))}}
@keyframes nicGlow{0%,100%{filter:drop-shadow(0 0 2px rgba(157,143,252,.4))}50%{filter:drop-shadow(0 0 10px rgba(157,143,252,.9))}}
@keyframes scorePopD{0%{transform:scale(1)}40%{transform:scale(1.18);color:#6ee7b7}100%{transform:scale(1);color:var(--d)}}
@keyframes scorePopN{0%{transform:scale(1)}40%{transform:scale(1.18);color:#c4b5fd}100%{transform:scale(1);color:var(--n)}}
@keyframes burstD{0%,100%{box-shadow:0 0 0 0 transparent}35%{box-shadow:0 0 36px 8px rgba(14,207,151,.35)}}
@keyframes burstN{0%,100%{box-shadow:0 0 0 0 transparent}35%{box-shadow:0 0 36px 8px rgba(157,143,252,.35)}}
.score-pop-dan{animation:scorePopD .5s ease}
.score-pop-nic{animation:scorePopN .5s ease}
.pc.burst-dan{animation:burstD .7s ease-out}
.pc.burst-nic{animation:burstN .7s ease-out}
.liquid-bar-wrap{margin-top:2px}
.liquid-tube{position:relative;height:13px;border-radius:var(--r99);overflow:hidden;background:rgba(0,0,0,.4);box-shadow:inset 0 1px 4px rgba(0,0,0,.5)}
.liquid-fill{position:absolute;left:0;top:0;bottom:0;border-radius:var(--r99);transition:width .9s cubic-bezier(.4,0,.2,1);overflow:hidden}
.pc-dan .liquid-fill{background:linear-gradient(90deg,#059669,var(--d),#6ee7b7,var(--d),#059669);background-size:300% 100%;animation:liquidFlow 3s ease infinite}
.pc-nic .liquid-fill{background:linear-gradient(90deg,#4f46e5,var(--n),#c4b5fd,var(--n),#4f46e5);background-size:300% 100%;animation:liquidFlow 3s ease infinite}
.liquid-wave{position:absolute;top:-3px;left:0;width:200%;height:9px;background:rgba(255,255,255,.12);border-radius:40%;animation:waveAnim 1.8s linear infinite}
.liquid-shine{position:absolute;top:2px;left:5%;right:10%;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);border-radius:var(--r99)}
.liquid-bubble{position:absolute;border-radius:50%;background:rgba(255,255,255,.28);animation:bubbleRise 1.4s ease-in infinite}
.liquid-gloss{position:absolute;top:0;left:0;right:0;height:4px;border-radius:var(--r99) var(--r99) 0 0;background:linear-gradient(to bottom,rgba(255,255,255,.12),transparent)}
.liquid-pct{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:8px;font-weight:700;color:rgba(255,255,255,.8);text-shadow:0 1px 3px rgba(0,0,0,.7);z-index:3;pointer-events:none}
.liquid-tube.complete-dan{animation:danGlow 1.8s ease-in-out infinite}
.liquid-tube.complete-nic{animation:nicGlow 1.8s ease-in-out infinite}
.sweep-overlay{position:absolute;top:0;left:0;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.75),transparent);border-radius:var(--r99);pointer-events:none;animation:sweepAnim 1.1s ease-out both;z-index:4}

/* ══ TABS ══ */
.tabs-wrap{margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs-wrap::-webkit-scrollbar{display:none}
.tabs{display:flex;gap:2px;background:var(--s2);border:1px solid var(--b0);border-radius:var(--r12);padding:4px;min-width:max-content}
.tab{padding:8px 14px;border-radius:var(--r8);font-size:12px;font-weight:600;color:var(--t2);background:transparent;white-space:nowrap;letter-spacing:.01em}
.tab:hover{color:var(--t1);background:var(--b0)}
.tab.on{background:var(--s4);color:var(--t0);font-weight:700;box-shadow:0 1px 6px rgba(0,0,0,.35)}

/* ══ PERIOD BAR ══ */
.pb{
  background:var(--s2);border:1px solid var(--b0);
  border-radius:var(--r12);padding:10px 14px;
  margin-bottom:12px;display:flex;
  align-items:center;justify-content:space-between;gap:8px
}
.pb-title{font-size:13px;font-weight:700;color:var(--t0)}
.pb-sub{font-size:10px;color:var(--t2);margin-top:2px}
.pb-badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:var(--r99);background:var(--b1);color:var(--t1);white-space:nowrap;letter-spacing:.04em;flex-shrink:0}

/* ══ SECTIONS ══ */
.sec{margin-bottom:22px}
.sec-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;margin-bottom:8px;
  border-radius:var(--r8);
}
.sec-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;display:flex;align-items:center;gap:7px}
.sec-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sec-cnt{font-size:10px;font-weight:600;opacity:.6}
/* section themes */
.sh-d{background:rgba(245,158,11,.06);border-left:3px solid #f59e0b;color:#fbbf24}
.sh-s{background:rgba(14,207,151,.06);border-left:3px solid var(--d);color:var(--d)}
.sh-m{background:rgba(157,143,252,.06);border-left:3px solid var(--n);color:var(--n)}
.sh-t{background:rgba(196,181,253,.06);border-left:3px solid #c4b5fd;color:#c4b5fd}

/* ══ TASK CARDS ══ */
.tgrid{display:flex;flex-direction:column;gap:6px}
.tc{
  background:var(--s2);border:1px solid var(--b1);
  border-radius:var(--r12);overflow:hidden;
  transition:border-color .15s;
}
.tc.done{opacity:.6}
.tc.needs-photo{border-color:rgba(248,113,113,.35)!important;animation:nphPulse 2s ease-in-out infinite}
@keyframes nphPulse{0%,100%{border-color:rgba(248,113,113,.35)}50%{border-color:rgba(248,113,113,.65)}}

/* Card top */
.tc-top{display:flex;align-items:center;gap:9px;padding:11px 13px 0}
.tc-pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tc-plbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.tc-plbl-d{color:var(--d)}
.tc-plbl-n{color:var(--n)}
.tc-pdot-d{background:var(--d)}
.tc-pdot-n{background:var(--n)}
.tc-pts{font-size:10px;font-weight:600;color:var(--t3);margin-left:auto;flex-shrink:0}

/* Card main */
.tc-main{display:flex;align-items:flex-start;gap:10px;padding:8px 13px 11px}
.tc-icon{font-size:20px;flex-shrink:0;line-height:1.2;margin-top:1px}
.tc-content{flex:1;min-width:0}
.tc-title{font-size:13.5px;font-weight:600;color:var(--t0);line-height:1.35;margin-bottom:5px}
.tc-title.done{text-decoration:line-through;color:var(--t3)}
.tc-chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px}
.chip-time{background:var(--b0);color:var(--t2);border:1px solid var(--b0)}
.chip-note{background:rgba(251,191,36,.08);color:#fbbf24;border:1px solid rgba(251,191,36,.15)}
.tc-chk{
  width:26px;height:26px;border-radius:7px;
  border:1.5px solid var(--b2);background:transparent;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:2px;transition:all .15s
}
.tc-chk:hover{border-color:var(--b3);background:var(--b1)}
.tc-chk.ck-d{background:var(--d);border-color:var(--d)}
.tc-chk.ck-n{background:var(--n);border-color:var(--n)}

/* Card verify */
.tc-verify{
  display:flex;align-items:center;gap:8px;
  padding:7px 13px;border-top:1px solid var(--b0);
  background:rgba(0,0,0,.12);min-height:34px;
}
.v-ok{font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px}
.v-ok-d{color:var(--d)}
.v-ok-n{color:var(--n)}
.v-pend{font-size:11px;color:var(--t3);font-weight:500}
.v-time{font-size:10px;color:var(--t3);margin-left:auto;flex-shrink:0}
.v-img{width:30px;height:30px;border-radius:6px;object-fit:cover;border:1px solid var(--b2);cursor:pointer;flex-shrink:0;margin-left:auto;transition:transform .15s}
.v-img:hover{transform:scale(1.08)}
.v-photo-btn{font-size:10px;font-weight:600;padding:4px 10px;border-radius:6px;background:var(--err2);color:var(--err);border:1px solid rgba(248,113,113,.2);margin-left:auto;white-space:nowrap;flex-shrink:0}

/* Card instructions */
.tc-inst-btn{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 13px;border-top:1px solid var(--b0);
  font-size:11px;font-weight:600;color:var(--t3);
  background:transparent;width:100%;text-align:left
}
.tc-inst-btn:hover{color:var(--t2);background:var(--b0)}
.tc-inst-body{padding:10px 13px 12px;border-top:1px solid var(--b0);background:rgba(0,0,0,.12)}
.tc-inst-body ol{padding-left:16px}
.tc-inst-body li{font-size:11.5px;color:var(--t2);line-height:1.75;padding:1px 0}

/* ══ MISSED BANNER ══ */
.missed-wrap{
  background:var(--err2);border:1px solid rgba(248,113,113,.15);
  border-radius:var(--r12);padding:11px 13px;margin-bottom:12px
}
.missed-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.missed-title{font-size:12px;font-weight:700;color:var(--err);display:flex;align-items:center;gap:6px}
.missed-count{font-size:9px;font-weight:700;padding:2px 7px;border-radius:var(--r99);background:rgba(248,113,113,.15);color:var(--err)}
.missed-item{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid rgba(248,113,113,.07)}
.missed-item:last-child{border-bottom:none}
.missed-icon{font-size:14px}
.missed-info{flex:1;min-width:0}
.missed-task{font-size:11px;font-weight:600;color:rgba(255,255,255,.55)}
.missed-meta{font-size:9px;color:rgba(248,113,113,.65);font-weight:600;margin-top:1px}

/* ══ LIST VIEW ══ */
.list-table-wrap{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r12);overflow:hidden;margin-bottom:16px}
.list-table{width:100%;border-collapse:collapse}
.list-table th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);padding:9px 12px;text-align:left;border-bottom:1px solid var(--b0)}
.list-table td{padding:9px 12px;font-size:12px;vertical-align:middle;border-bottom:1px solid var(--b0);color:var(--t1)}
.list-table tr:last-child td{border-bottom:none}
.row-d td:first-child{border-left:2px solid var(--d)}
.row-n td:first-child{border-left:2px solid var(--n)}
.list-sec-hdr{padding:8px 12px;background:var(--s3);border-bottom:1px solid var(--b0);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;display:flex;justify-content:space-between}
.totals-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.total-card{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r12);padding:16px;text-align:center}
.total-card-d{border-top:2px solid var(--d)}
.total-card-n{border-top:2px solid var(--n)}
.total-num{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;letter-spacing:-.03em;line-height:1;margin-bottom:4px}
.total-card-d .total-num{color:var(--d)}
.total-card-n .total-num{color:var(--n)}
.total-lbl{font-size:11px;font-weight:600;color:var(--t2)}

/* ══ HISTORY ══ */
.hist-filter{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.hist-filter::-webkit-scrollbar{display:none}
.hf-btn{padding:6px 12px;border-radius:var(--r8);font-size:11px;font-weight:600;color:var(--t2);background:var(--s2);border:1px solid var(--b1);white-space:nowrap;flex-shrink:0}
.hf-btn:hover{color:var(--t1)}
.hf-btn.on{background:var(--d3);color:var(--d);border-color:rgba(14,207,151,.3)}
.hist-section{margin-bottom:16px}
.hist-sec-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 12px;background:var(--s2);border:1px solid var(--b1);
  border-radius:var(--r10);margin-bottom:6px
}
.hist-sec-title{font-size:13px;font-weight:700;color:var(--t0)}
.hist-sec-sub{font-size:10px;color:var(--t2);margin-top:1px}
.hist-sec-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:var(--r99);background:var(--d3);color:var(--d);border:1px solid rgba(14,207,151,.2)}
.hist-item{display:flex;align-items:center;gap:9px;padding:8px 11px;background:var(--s2);border-radius:var(--r8);margin-bottom:4px;border-left:2px solid transparent}
.hi-d{border-left-color:var(--d)}
.hi-n{border-left-color:var(--n)}
.hi-miss{border-left-color:var(--err);background:var(--err2)}
.hist-icon{font-size:14px;flex-shrink:0}
.hist-info{flex:1;min-width:0}
.hist-title{font-size:12px;font-weight:600;color:var(--t0)}
.hist-meta{font-size:10px;color:var(--t2);margin-top:1px;display:flex;gap:5px;flex-wrap:wrap}
.hist-stamp{font-size:10px;color:var(--t3);flex-shrink:0}
.hist-badge-miss{font-size:9px;font-weight:700;color:var(--err);background:rgba(248,113,113,.12);padding:2px 6px;border-radius:6px;flex-shrink:0}
.hist-empty{text-align:center;padding:50px 20px;color:var(--t3);font-size:13px;line-height:2.2}

/* ══ CAMERA ══ */
.cam-overlay{position:fixed;inset:0;background:#000;z-index:999;display:flex;flex-direction:column;align-items:center;overflow-y:auto}
.cam-overlay.hidden{display:none}
.cam-topbar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:env(safe-area-inset-top,16px) 20px 14px;background:rgba(0,0,0,.7);backdrop-filter:blur(12px)}
.cam-topbar-title{font-size:14px;font-weight:700;color:var(--t0)}
.cam-topbar-task{font-size:11px;color:var(--t2);margin-top:2px;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cam-close{background:rgba(255,255,255,.09);color:var(--t0);border-radius:50%;width:36px;height:36px;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cam-vf{width:100%;max-width:480px;aspect-ratio:4/3;background:#000;position:relative;overflow:hidden}
.cam-video{width:100%;height:100%;object-fit:cover;display:block}
.cam-preview{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;display:none}
.cam-preview.show{display:block}
.cam-grid{position:absolute;inset:0;pointer-events:none;background:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px) 0 0/33.33% 33.33%,linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px) 0 0/33.33% 33.33%}
.cam-flip{position:absolute;top:11px;right:11px;background:rgba(0,0,0,.55);color:#fff;border-radius:50%;width:34px;height:34px;font-size:15px;display:flex;align-items:center;justify-content:center}
.cam-info{width:100%;max-width:480px;padding:13px 18px;background:rgba(0,0,0,.65)}

  background:linear-gradient(135deg,#059669,var(--d));
  color:#fff;font-size:13px;font-weight:700;
  padding:13px 30px;border-radius:var(--r99);
  box-shadow:0 4px 24px rgba(14,207,151,.4);

}
.save-flash.show{opacity:1}

   steps:["Limpia el vidrio exterior y las manillas con limpiavidrios.","Saca las rejillas y remójalas en agua caliente con detergente.","Aplica bicarbonato + vinagre por dentro, deja 15-20 min.","Frota el interior con esponja, fondo y lados.","Limpia las rejillas y vuélvelas a poner."]},

// ══════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════
const SC = {
  diaria:     {shCls:"sh-d", dotC:"#f59e0b", label:"Diarias"},
  semanal:    {shCls:"sh-s", dotC:"var(--d)", label:"Semanales"},
  mensual:    {shCls:"sh-m", dotC:"var(--n)", label:"Mensuales"},
  trimestral: {shCls:"sh-t", dotC:"#c4b5fd", label:"Trimestrales"},
};
const MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DAYS   = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const LOOK_BACK = {diaria:7, semanal:8, mensual:6, trimestral:4};

let activeTab = "hoy";
let openCards = {};
let histFilter = "todo";
const NOW = new Date();

// ══════════════════════════════════════
// STORAGE
// ══════════════════════════════════════
let dbCache = {};
function p2(n){return String(n).padStart(2,"0")}
function fmtDate(d){return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`}
function weekKey(d){const t=new Date(d);t.setHours(0,0,0,0);t.setDate(t.getDate()-((t.getDay()+6)%7));return `W${fmtDate(t)}`}
function monthKey(d){return `${d.getFullYear()}-${p2(d.getMonth()+1)}`}
function quarterKey(d){return `${d.getFullYear()}-Q${Math.ceil((d.getMonth()+1)/3)}`}
function periodKey(freq,d){
  if(freq==="diaria")return fmtDate(d);
  if(freq==="semanal")return weekKey(d);
  if(freq==="mensual")return monthKey(d);
  return quarterKey(d);
}
function sKey(id,period){return `td26_${id}_${period}`}
function hasFirebase(){return FIREBASE_URL&&FIREBASE_URL.length>10}
function isTaskDone(t){return !!dbCache[sKey(t.id,periodKey(t.freq,NOW))]}
function getStamp(t){return dbCache[sKey(t.id,periodKey(t.freq,NOW))]||null}
function loadLocalStorage(){
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith('td26_')&&!k.startsWith('td26_photo_'))dbCache[k]=localStorage.getItem(k);
  }
}
function loadPhotos(){
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith('td26_photo_'))photoCache[k.replace('td26_photo_','')]=localStorage.getItem(k);
  }
}
function showSyncStatus(msg){
  const el=document.getElementById("sync-status");
  if(el){el.textContent=msg;setTimeout(()=>el.textContent=hasFirebase()?"☁️ En línea":"💾 Solo local",3000);}
}
function flash(){
  const e=document.getElementById("save-flash");
  e.classList.add("show");setTimeout(()=>e.classList.remove("show"),2200);
}

// ══════════════════════════════════════
// SESSION + PHOTO + CAMERA
// ══════════════════════════════════════
const sessionMarked = new Set();
let pendingChanges = 0;
let photoCache = {};
let camTaskId = null;
let camStream = null;
let camFacingMode = "environment";
let capturedDataUrl = null;

function updateSaveBtn(){
  const wrap=document.getElementById("save-wrap");
  if(!wrap)return;
  wrap.classList.toggle("show",pendingChanges>0);
  const btn=document.getElementById("save-btn");
  if(!btn)return;
  const missing=[...sessionMarked].filter(k=>!photoCache[k]);
  if(missing.length){
    btn.style.background="linear-gradient(135deg,#7f1d1d,#ef4444)";
    btn.style.boxShadow="0 4px 24px rgba(239,68,68,.4)";
    btn.innerHTML=`<svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 2v6M7.5 12v.5" stroke="white" stroke-width="2.3" stroke-linecap="round"/></svg> Falta foto (${missing.length})`;
  } else {
    btn.style.background="linear-gradient(135deg,#059669,var(--d))";
    btn.style.boxShadow="0 4px 24px rgba(14,207,151,.4)";
    btn.innerHTML=`<svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2 7.5L5.5 11L13 4" stroke="white" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/></svg> Guardar cambios`;
  }
}

function toggleTask(id){
  const t=TASKS.find(x=>x.id===id);
  const k=sKey(id,periodKey(t.freq,NOW));
  const wasDone=!!dbCache[k];
  if(wasDone){
    delete dbCache[k]; localStorage.removeItem(k);
    delete photoCache[k]; localStorage.removeItem("td26_photo_"+k);
    sessionMarked.delete(k);
    pendingChanges=Math.max(0,pendingChanges-1);
    updateSaveBtn(); render();
  } else {
    openCamera(id);
  }
}

async function openCamera(taskId){
  camTaskId=taskId; capturedDataUrl=null;
  const t=TASKS.find(x=>x.id===taskId);
  document.getElementById("cam-task-label").textContent=t.icon+" "+t.title;
  document.getElementById("cam-task-name").textContent=t.icon+" "+t.title;
  const prev=document.getElementById("cam-preview");
  prev.classList.remove("show"); prev.src="";
  document.getElementById("cam-confirm").classList.remove("show");
  document.getElementById("cam-retake").classList.remove("show");
  document.getElementById("cam-shutter").style.display="";
  document.getElementById("cam-flip").style.display="";
  document.getElementById("cam-overlay").classList.remove("hidden");
  await startStream();
}
async function startStream(){
  stopStream();
  try{
    camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:camFacingMode,width:{ideal:1280},height:{ideal:960}},audio:false});
    const vid=document.getElementById("cam-video");
    vid.srcObject=camStream; vid.style.display="";
  }catch(e){
    document.getElementById("cam-video").style.display="none";
    document.getElementById("cam-flip").style.display="none";
    document.getElementById("cam-file").click();
  }
}
function stopStream(){if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}}
function flipCamera(){camFacingMode=camFacingMode==="environment"?"user":"environment";startStream();}

function capturePhoto(){
  const vid=document.getElementById("cam-video");
  const canvas=document.createElement("canvas");
  const scale=Math.min(1,640/vid.videoWidth);
  canvas.width=Math.round(vid.videoWidth*scale);
  canvas.height=Math.round(vid.videoHeight*scale);
  canvas.getContext("2d").drawImage(vid,0,0,canvas.width,canvas.height);
  capturedDataUrl=canvas.toDataURL("image/jpeg",0.5);
  showPreview(capturedDataUrl);
}
function handleFilePhoto(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement("canvas");
      const scale=Math.min(1,640/img.width);
      canvas.width=Math.round(img.width*scale);
      canvas.height=Math.round(img.height*scale);
      canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
      capturedDataUrl=canvas.toDataURL("image/jpeg",0.5);
      showPreview(capturedDataUrl);
      document.getElementById("cam-overlay").classList.remove("hidden");
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value="";
}
function showPreview(dataUrl){
  stopStream();
  document.getElementById("cam-video").style.display="none";
  const prev=document.getElementById("cam-preview");
  prev.src=dataUrl; prev.classList.add("show");
  document.getElementById("cam-shutter").style.display="none";
  document.getElementById("cam-retake").classList.add("show");
  document.getElementById("cam-confirm").classList.add("show");
}
function retakePhoto(){
  capturedDataUrl=null;
  document.getElementById("cam-preview").classList.remove("show");
  document.getElementById("cam-video").style.display="";
  document.getElementById("cam-shutter").style.display="";
  document.getElementById("cam-retake").classList.remove("show");
  document.getElementById("cam-confirm").classList.remove("show");
  startStream();
}
function confirmPhoto(){
  if(!capturedDataUrl||!camTaskId)return;
  stopStream();
  document.getElementById("cam-overlay").classList.add("hidden");
  const t=TASKS.find(x=>x.id===camTaskId);
  const k=sKey(camTaskId,periodKey(t.freq,NOW));
  const n=new Date();

}

// SAVE + FIREBASE
// ══════════════════════════════════════
async function confirmSave(){
  const missing=[...sessionMarked].filter(k=>!photoCache[k]);
  if(missing.length){
    alert("📷 Falta foto en "+missing.length+" tarea(s). Toca 'Tomar foto' en cada una.");
    return;
  }
  if(hasFirebase()&&sessionMarked.size>0){
    const patch={};
    for(const k of sessionMarked){
      const safe=k.replace(/[.#$\[\]]/g,'_');
      patch[safe]=dbCache[k]||null;
    }
    try{
      await fetch(`${FIREBASE_URL}/tareas.json`,{method:'PATCH',body:JSON.stringify(patch),headers:{'Content-Type':'application/json'}});
      showSyncStatus("☁️ Guardado en la nube");
    }catch(e){showSyncStatus("⚠️ Sin conexión — local");}
  }
  sessionMarked.clear();pendingChanges=0;updateSaveBtn();flash();
}
async function pullFromFirebase(){
  if(!hasFirebase())return;
  try{
    const res=await fetch(`${FIREBASE_URL}/tareas.json`);
    const data=await res.json();
    if(data&&typeof data==='object'){
      const merged={...data};
      for(const k of sessionMarked)merged[k]=dbCache[k];
      dbCache=merged;render();showSyncStatus("☁️ Actualizado");
    }
  }catch(e){}
}

let _prevDD=-1,_prevND=-1;
function updateScores(){
  const tasks=getTabTasks();
  let dD=0,dT=0,dP=0,dTP=0,nD=0,nT=0,nP=0,nTP=0;
  for(const t of tasks){
    const done=isTaskDone(t);
    if(t.person==="Daniel"){dT++;dTP+=t.pts;if(done){dD++;dP+=t.pts;}}
    else{nT++;nTP+=t.pts;if(done){nD++;nP+=t.pts;}}
  }
  document.getElementById("dan-score").textContent=dP;
  document.getElementById("dan-sub").textContent=`${dD}/${dT} tareas · ${dTP} pts totales`;
  document.getElementById("nic-score").textContent=nP;
  document.getElementById("nic-sub").textContent=`${nD}/${nT} tareas · ${nTP} pts totales`;
  segBar("dan-bar",dD,dT,"Daniel");
  segBar("nic-bar",nD,nT,"Nicolas");
}
function segBar(cid,done,total,person){
  const wrap=document.getElementById(cid);if(!wrap)return;
  const isDan=person==="Daniel";
  const pct=total>0?Math.round(done/total*100):0;
  const isComplete=total>0&&done>=total;
  const ccls=isDan?"complete-dan":"complete-nic";
  const bubbles=[{l:"15%",s:"4px",d:"0s",u:"1.6s"},{l:"40%",s:"3px",d:".5s",u:"1.3s"},{l:"65%",s:"5px",d:".9s",u:"1.8s"}]
    .map(b=>`<div class="liquid-bubble" style="left:${b.l};bottom:2px;width:${b.s};height:${b.s};animation-duration:${b.u};animation-delay:${b.d}"></div>`).join("");
  wrap.innerHTML=`<div class="liquid-tube ${isComplete?ccls:""}">
    <div class="liquid-fill" style="width:${pct}%">
      <div class="liquid-wave"></div><div class="liquid-shine"></div>${bubbles}
    </div>
    <div class="liquid-gloss"></div><div class="liquid-pct">${pct}%</div>
  </div>`;
  if(isComplete){
    const tube=wrap.querySelector(".liquid-tube");
    const s=document.createElement("div");s.className="sweep-overlay";
    tube.appendChild(s);setTimeout(()=>{if(s.parentNode)s.parentNode.removeChild(s);},1400);
  }
  const prev=isDan?_prevDD:_prevND;
  if(isComplete&&prev>=0&&prev!==done){
    const pc=wrap.closest(".pc");
    const bc=isDan?"burst-dan":"burst-nic";
    pc.classList.remove(bc);void pc.offsetWidth;pc.classList.add(bc);setTimeout(()=>pc.classList.remove(bc),700);
    const sc=document.getElementById(isDan?"dan-score":"nic-score");
    const pp=isDan?"score-pop-dan":"score-pop-nic";
    sc.classList.remove(pp);void sc.offsetWidth;sc.classList.add(pp);setTimeout(()=>sc.classList.remove(pp),600);
  }
  if(isDan)_prevDD=done;else _prevND=done;
}

// ══════════════════════════════════════
// PERIOD KEYS
// ══════════════════════════════════════
function pastPeriodKeys(freq,n){
  const keys=[];const d=new Date(NOW);
  for(let i=1;i<=n;i++){
    if(freq==="diaria"){d.setDate(d.getDate()-1);keys.push(fmtDate(d));}
    else if(freq==="semanal"){d.setDate(d.getDate()-7);keys.push(weekKey(d));}
    else if(freq==="mensual"){d.setMonth(d.getMonth()-1);keys.push(monthKey(d));}
    else{d.setMonth(d.getMonth()-3);keys.push(quarterKey(d));}
  }
  return keys;
}
function periodKeyLabel(freq,key){
  if(freq==="diaria"){
    const[y,m,dd]=key.split("-").map(Number);
    const dt=new Date(y,m-1,dd);
    return `${DAYS[dt.getDay()]} ${dd} ${MONTHS[m-1]}`;
  }
  if(freq==="semanal"){
    const raw=key.replace("W","");
    const[y,m,dd]=raw.split("-").map(Number);
    const mon=new Date(y,m-1,dd);
    const sun=new Date(mon);sun.setDate(mon.getDate()+6);
    return `Semana ${mon.getDate()}–${sun.getDate()} ${MONTHS[sun.getMonth()]}`;
  }
  if(freq==="mensual"){const[y,m]=key.split("-").map(Number);return `${MONTHS[m-1]} ${y}`;}
  return `Trimestre ${key.replace("-Q"," Q")}`;
}

// ══════════════════════════════════════
// HISTORY VIEW
// ══════════════════════════════════════
function histView(){
  const entries=[];
  for(const[k,stamp]of Object.entries(dbCache)){
    if(!k.startsWith("td26_")||!stamp||typeof stamp!=="string")continue;
    const inner=k.replace("td26_","");
    let taskId=null,period=null;
    for(const t of TASKS){if(inner.startsWith(t.id+"_")){taskId=t.id;period=inner.slice(t.id.length+1);break;}}
    if(!taskId)continue;
    const task=TASKS.find(t=>t.id===taskId);
    entries.push({task,period,stamp,key:k,missed:false});
  }
  const freqs=["semanal","mensual","trimestral"];
  for(const t of TASKS){
    if(!freqs.includes(t.freq))continue;
    for(const pk of pastPeriodKeys(t.freq,LOOK_BACK[t.freq])){
      const k=sKey(t.id,pk);
      if(!dbCache[k]&&!dbCache[k.replace(/[.#$\[\]]/g,'_')]){
        entries.push({task:t,period:pk,stamp:null,key:k,missed:true});
      }
    }
  }
  if(!entries.length)return `<div class="hist-empty">Sin historial todavía.<br>Marca tu primera tarea ✅</div>`;
  const grouped={};
  for(const e of entries){
    const label=periodKeyLabel(e.task.freq,e.period);
    if(!grouped[label])grouped[label]={label,sortKey:e.period,items:[]};
    grouped[label].items.push(e);
  }
  const groups=Object.values(grouped).sort((a,b)=>b.sortKey.localeCompare(a.sortKey));

  let html=`<div class="hist-filter">
    <button class="hf-btn ${histFilter==="todo"?"on":""}" onclick="setHistFilter('todo')">Todos</button>
    <button class="hf-btn ${histFilter==="daniel"?"on":""}" onclick="setHistFilter('daniel')">🟢 Daniel</button>
    <button class="hf-btn ${histFilter==="nicolas"?"on":""}" onclick="setHistFilter('nicolas')">🔵 Nicolás</button>
    <button class="hf-btn ${histFilter==="missed"?"on":""}" onclick="setHistFilter('missed')">⚠️ No cumplidas</button>
  </div>`;

  for(const g of groups){
    let items=g.items.filter(e=>{
      if(histFilter==="daniel")return e.task.person==="Daniel";
      if(histFilter==="nicolas")return e.task.person==="Nicolas";
      if(histFilter==="missed")return e.missed;
      return true;
    });
    if(!items.length)continue;
    const doneC=items.filter(e=>!e.missed).length;
    const missedC=items.filter(e=>e.missed).length;
    const totalPts=items.filter(e=>!e.missed).reduce((s,e)=>s+e.task.pts,0);
    html+=`<div class="hist-section">
      <div class="hist-sec-hdr">
        <div>
          <div class="hist-sec-title">${g.label}</div>
          <div class="hist-sec-sub">✅ ${doneC} hechas · ⚠️ ${missedC} no cumplidas · ${totalPts} pts</div>
        </div>
        <div class="hist-sec-badge" style="${missedC?"background:rgba(248,113,113,.12);color:var(--err);border-color:rgba(248,113,113,.2)":""}">${items.length}</div>
      </div>`;
    items.sort((a,b)=>(a.missed?1:-1)-(b.missed?1:-1)||(b.stamp||"").localeCompare(a.stamp||""));
    for(const e of items){
      const isDan=e.task.person==="Daniel";
      const pc=isDan?"var(--d)":"var(--n)";
      const pl=isDan?"Daniel":"Nicolás";
      if(e.missed){
        html+=`<div class="hist-item hi-miss">
          <span class="hist-icon">${e.task.icon}</span>
          <div class="hist-info">
            <div class="hist-title" style="color:rgba(240,240,248,.45)">${e.task.title}</div>
            <div class="hist-meta"><span style="color:${pc};font-weight:700">${pl}</span><span>★ ${e.task.pts} pts</span></div>
          </div>
          <div class="hist-badge-miss">❌ No cumplida</div>
        </div>`;
      } else {
        html+=`<div class="hist-item ${isDan?"hi-d":"hi-n"}">
          <span class="hist-icon">${e.task.icon}</span>
          <div class="hist-info">
            <div class="hist-title">${e.task.title}</div>
            <div class="hist-meta"><span style="color:${pc};font-weight:700">${pl}</span><span>★ ${e.task.pts} pts</span><span>⏱ ${e.task.time} min</span></div>
          </div>
          <div class="hist-stamp">${e.stamp}</div>
        </div>`;
      }
    }
    html+=`</div>`;
  }
  return html;
}
function setHistFilter(f){histFilter=f;render();}

// TAB + RENDER

function getTabTasks(){
  if(activeTab==="hoy")       return TASKS.filter(t=>t.freq==="diaria");
  if(activeTab==="semana")    return TASKS.filter(t=>t.freq==="semanal");
  if(activeTab==="mes")       return TASKS.filter(t=>t.freq==="mensual");
  if(activeTab==="trimestre") return TASKS.filter(t=>t.freq==="trimestral");
  if(activeTab==="historial") return [];
  return TASKS;
}
function render(){
  const d=NOW;
  document.getElementById("hdr-date").textContent=`${DAYS[d.getDay()]} ${d.getDate()} de ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  updateScores();renderBanner();updateSaveBtn();
  const el=document.getElementById("content");
  if(activeTab==="lista"){el.innerHTML=listView();return;}
  if(activeTab==="historial"){el.innerHTML=histView();return;}
  const tasks=getTabTasks();
  const byFreq={};
  for(const t of tasks)(byFreq[t.freq]=byFreq[t.freq]||[]).push(t);
  const order=["diaria","semanal","mensual","trimestral"];
  let html=getMissedBanner();
  for(const f of order)if(byFreq[f])html+=sectionHTML(byFreq[f],SC[f]);
  el.innerHTML=html||`<div style="text-align:center;padding:50px 20px;color:var(--t3);font-size:13px">Sin tareas para este período 🎉</div>`;
}
function setTab(t){
  activeTab=t;
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("on"));
  document.getElementById("tab-"+t).classList.add("on");
  render();
}
function openCard(id){openCards[id]=!openCards[id];render();}
function resetPeriod(){
  const lbl={hoy:"de hoy",semana:"de esta semana",mes:"de este mes",trimestre:"de este trimestre",lista:"de todo",historial:""}[activeTab];
  if(!confirm(`¿Resetear las tareas ${lbl}?`))return;
  const tasks=activeTab==="lista"?TASKS:getTabTasks();
  for(const t of tasks){
    const k=sKey(t.id,periodKey(t.freq,NOW));
    delete dbCache[k];localStorage.removeItem(k);
    delete photoCache[k];localStorage.removeItem("td26_photo_"+k);
    sessionMarked.delete(k);
    if(hasFirebase()){fetch(`${FIREBASE_URL}/tareas/${k.replace(/[.#$\[\]]/g,'_')}.json`,{method:'DELETE'}).catch(()=>{});}
  }
  pendingChanges=0;updateSaveBtn();flash();render();
}
